name: Prisma Migrate Deploy

on:
  push:
    branches:
      - main
    paths:
      - "prisma/schema.prisma"
      - "prisma/migrations/**"
      - ".github/workflows/prisma-migrate-deploy.yml"
  workflow_dispatch:

concurrency:
  group: prisma-migrate-deploy-main
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
      DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Verify required secrets
        run: |
          test -n "$DATABASE_URL" || (echo "PROD_DATABASE_URL is empty" && exit 1)
          test -n "$DIRECT_URL" || (echo "PROD_DIRECT_URL is empty" && exit 1)

      - name: Print runtime versions
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrate deploy
        run: npx prisma migrate deploy
